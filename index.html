<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Airpress CRM">
<meta name="theme-color" content="#0f172a">
<title>Airpress CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--bg4:#2d3f55;
  --border:#334155;--border2:#475569;
  --text:#f1f5f9;--text2:#cbd5e1;--text3:#94a3b8;
  --green:#10b981;--green2:#059669;--green3:#34d399;
  --blue:#3b82f6;--blue2:#60a5fa;
  --amber:#f59e0b;--amber2:#fcd34d;
  --red:#ef4444;--red2:#fca5a5;
  --purple:#8b5cf6;--purple2:#a78bfa;
  --teal:#14b8a6;--teal2:#2dd4bf;
  --orange:#f97316;--orange2:#fb923c;
  --r:10px;--rl:14px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.4;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.topbar{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:54px;}
.topbar-left{display:flex;flex-direction:column;}
.topbar-title{font-size:17px;font-weight:700;color:var(--text);}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:14px;}
.page.active{display:block;}
.bottom-nav{display:grid;grid-template-columns:repeat(5,1fr);background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 6px;cursor:pointer;color:var(--text3);border:none;background:none;font-family:var(--font);gap:2px;transition:color .15s;}
.nav-btn.active{color:var(--blue2);}
.nav-icon{font-size:19px;line-height:1;}
.nav-label{font-size:10px;font-weight:500;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 15px;border-radius:var(--r);border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:active{background:var(--bg3);}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red2);border:1px solid rgba(239,68,68,.3);}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:7px;}
.fab{position:fixed;bottom:calc(66px + env(safe-area-inset-bottom,0px));right:16px;width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;box-shadow:0 4px 16px rgba(59,130,246,.4);transition:transform .15s;}
.fab:active{transform:scale(.92);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden;}
.card-hdr{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;}
.card-body{padding:13px 14px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stats-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 13px;}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.stat-val{font-size:20px;font-weight:700;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.bg-green{background:rgba(16,185,129,.15);color:var(--green3);}
.bg-amber{background:rgba(245,158,11,.15);color:var(--amber2);}
.bg-red{background:rgba(239,68,68,.15);color:var(--red2);}
.bg-blue{background:rgba(59,130,246,.15);color:var(--blue2);}
.bg-purple{background:rgba(139,92,246,.15);color:var(--purple2);}
.bg-teal{background:rgba(20,184,166,.15);color:var(--teal2);}
.bg-orange{background:rgba(249,115,22,.15);color:var(--orange2);}
.bg-gray{background:var(--bg3);color:var(--text3);}
.list-item{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.list-item:last-child{border-bottom:none;}
.list-item:active{background:var(--bg4);}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.list-body{flex:1;min-width:0;}
.list-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-sub{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-right{text-align:right;flex-shrink:0;}
.search-wrap{position:relative;margin-bottom:12px;}
.search-inp{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 13px 10px 38px;font-size:14px;font-family:var(--font);color:var(--text);outline:none;}
.search-inp:focus{border-color:var(--blue);}
.search-inp::placeholder{color:var(--text3);}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);pointer-events:none;}
.sheet-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;}
.sheet-backdrop.open{display:flex;}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:93vh;overflow-y:auto;padding:8px 16px calc(18px + env(safe-area-inset-bottom,0px));-webkit-overflow-scrolling:touch;}
.sheet-handle{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 16px;}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:11px 12px;font-size:14px;font-family:var(--font);color:var(--text);outline:none;-webkit-appearance:none;appearance:none;}
.fi:focus{border-color:var(--blue);}
.fi::placeholder{color:var(--text3);}
select.fi option{background:var(--bg2);}
textarea.fi{resize:vertical;min-height:72px;}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.form-actions{display:flex;gap:8px;margin-top:8px;}
.form-actions .btn{flex:1;}
.sec-hdr{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin:14px 0 7px;display:flex;align-items:center;justify-content:space-between;}
.prog-wrap{background:var(--bg3);border-radius:6px;height:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:6px;transition:width .5s ease;}
.banner{border-radius:var(--r);padding:10px 13px;margin-bottom:10px;font-size:13px;display:flex;gap:9px;align-items:flex-start;line-height:1.5;}
.banner-blue{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--blue2);}
.banner-amber{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--amber2);}
.banner-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red2);}
.banner-green{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--green3);}
.banner-orange{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.25);color:var(--orange2);}
.field-box{background:var(--bg2);border-radius:var(--r);padding:10px 12px;}
.field-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.field-val{font-size:13px;font-weight:500;color:var(--text);}
.nota-box{background:var(--bg3);border-radius:var(--r);padding:10px 12px;font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px;white-space:pre-wrap;}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.quick-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 12px;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.quick-btn:active{transform:scale(.97);}
.quick-btn .qi{font-size:24px;}
.quick-btn .ql{font-size:12px;font-weight:600;color:var(--text);}
.quick-btn .qs{font-size:10px;color:var(--text3);}
.quick-btn.blue{border-color:var(--blue);background:rgba(59,130,246,.08);}
.quick-btn.green{border-color:var(--green);background:rgba(16,185,129,.08);}
.quick-btn.amber{border-color:var(--amber);background:rgba(245,158,11,.08);}
.quick-btn.orange{border-color:var(--orange);background:rgba(249,115,22,.08);}
.quick-btn.purple{border-color:var(--purple);background:rgba(139,92,246,.08);}
.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;}
.tab{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--text3);transition:all .15s;background:transparent;}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:8px;}
.empty-text{font-size:14px;color:var(--text2);margin-bottom:3px;}
.empty-sub{font-size:12px;}
.fu-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);}
.fu-item:last-child{border-bottom:none;}
.fu-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.fu-body{flex:1;}
.fu-title{font-size:13px;font-weight:500;}
.fu-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.orc-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:13px 14px;margin-bottom:8px;cursor:pointer;border-left-width:3px;}
.orc-card:active{background:var(--bg4);}
::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="topbar-title">Airpress CRM</div>
      <div class="topbar-sub" id="topbar-sub">Gestão de Vendas</div>
    </div>
    <div id="topbar-right"></div>
  </div>
  <div class="content" id="main-content">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dash"></div>

    <!-- CLIENTES (B1 + B2) -->
    <div class="page" id="page-clientes"></div>

    <!-- PROSPEÇÃO (Tipo A) -->
    <div class="page" id="page-prospeccao"></div>

    <!-- LEADS ONLINE (Tipo C) -->
    <div class="page" id="page-leads"></div>

    <!-- ORÇAMENTOS -->
    <div class="page" id="page-orcamentos"></div>

    <!-- FOLLOW-UPS -->
    <div class="page" id="page-followups"></div>

    <!-- ROTA -->
    <div class="page" id="page-rota"></div>

    <!-- DETALHE -->
    <div class="page" id="page-det"></div>

  </div>
  <button class="fab" id="fab" onclick="openFab()">＋</button>
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="navTo('dash',this,'Airpress CRM','Gestão de Vendas')"><span class="nav-icon">🏠</span><span class="nav-label">Início</span></button>
    <button class="nav-btn" onclick="navTo('clientes',this,'Clientes','Ativos e Distribuidores')"><span class="nav-icon">⭐</span><span class="nav-label">Clientes</span></button>
    <button class="nav-btn" onclick="navTo('prospeccao',this,'Prospeção','Tipo A — Tabela de preços')"><span class="nav-icon">🔍</span><span class="nav-label">Prospeção</span></button>
    <button class="nav-btn" onclick="navTo('leads',this,'Leads Online','Tipo C — Site e email')"><span class="nav-icon">📧</span><span class="nav-label">Leads</span></button>
    <button class="nav-btn" onclick="navTo('rota',this,'Rota Mensal','Norte → Sul')"><span class="nav-icon">🗺️</span><span class="nav-label">Rota</span></button>
  </div>
</div>

<div class="sheet-backdrop" id="sheet-bg" onclick="sheetBgClick(event)">
  <div class="sheet" id="sheet"><div class="sheet-handle"></div><div id="sheet-inner"></div></div>
</div>

<script>
// ─── STORAGE ──────────────────────────────────────────────────────────────────
const S={
  get(k){try{return JSON.parse(localStorage.getItem('ap_'+k));}catch{return null;}},
  set(k,v){try{localStorage.setItem('ap_'+k,JSON.stringify(v));}catch{}},
  arr(k){return this.get(k)||[];},
  id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
};

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const DISTRITOS_ROTA=[
  {id:'viana',nome:'Viana do Castelo',grupo:'individual'},
  {id:'braga',nome:'Braga',grupo:'individual'},
  {id:'porto',nome:'Porto',grupo:'individual'},
  {id:'vr-brag',nome:'Vila Real + Bragança',grupo:'agrupado',distritos:['Vila Real','Bragança']},
  {id:'aveiro',nome:'Aveiro',grupo:'base'},
  {id:'viseu',nome:'Viseu',grupo:'individual'},
  {id:'guarda-cb',nome:'Guarda + Castelo Branco',grupo:'agrupado',distritos:['Guarda','Castelo Branco']},
  {id:'coimbra',nome:'Coimbra',grupo:'individual'},
  {id:'leiria',nome:'Leiria',grupo:'individual'},
  {id:'santarem',nome:'Santarém',grupo:'individual'},
  {id:'port-evora',nome:'Portalegre + Évora',grupo:'agrupado',distritos:['Portalegre','Évora']},
  {id:'lisboa',nome:'Lisboa',grupo:'individual'},
  {id:'setubal',nome:'Setúbal',grupo:'individual'},
  {id:'beja-faro',nome:'Beja + Faro',grupo:'agrupado',distritos:['Beja','Faro']},
];

const TODOS_DISTRITOS=['Viana do Castelo','Braga','Porto','Vila Real','Bragança','Aveiro','Viseu','Guarda','Castelo Branco','Coimbra','Leiria','Santarém','Portalegre','Évora','Lisboa','Setúbal','Beja','Faro'];

const CATEGORIAS=['Compressores — Blue Basic','Compressores — Blue Plus','Compressores — Black Pro','Compressores — Pro Series','Compressores — G/K/APZ','Compressores de Parafuso','Minipressores','Peças Sobresselentes','Óleos','Depósitos de Ar','Secadores de Ar','Sistemas Filtração','Instalações Alumínio','Filtros de Ar','Mangueiras','Ligações Pneumáticas','Kits Acessórios','Ferramentas Pneumáticas','Ferramentas Manuais','Carros de Ferramentas','Armazenamento Ferramentas','Equipamento Oficina Auto','Paletes e Carros','Prensas Hidráulicas','Carregadores de Bateria','Aspiradores','Outros'];

const TIPO_LABELS={
  'B1':{label:'Cliente Direto',sub:'Orçamentos pontuais',cor:'--blue',badge:'bg-blue',icon:'🏭'},
  'B2':{label:'Distribuidor Ativo',sub:'Stock na loja — cliente ideal',cor:'--green',badge:'bg-green',icon:'⭐'},
};

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
let currentPage='dash', prevPage='dash';
function navTo(p,btn,title,sub){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  const pg=document.getElementById('page-'+p);
  if(pg) pg.classList.add('active');
  if(btn) btn.classList.add('active');
  document.getElementById('topbar-title').textContent=title||'Airpress CRM';
  document.getElementById('topbar-sub').textContent=sub||'';
  document.getElementById('topbar-right').innerHTML='';
  document.getElementById('fab').style.display='flex';
  prevPage=currentPage; currentPage=p;
  renders[p]&&renders[p]();
}
function navBack(){
  navTo(prevPage, document.querySelector('.nav-btn.active'));
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
const v=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const today=()=>new Date().toISOString().slice(0,10);
const addDays=(d,n)=>{const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);};
const diffDays=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);
const fmtDate=s=>{if(!s)return'—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('pt-PT',{day:'numeric',month:'short',year:'numeric'});};
const fmtDateShort=s=>{if(!s)return'—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('pt-PT',{day:'numeric',month:'short'});};
const initials=nome=>nome.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
const hoursAgo=s=>{if(!s)return 999;return Math.round((Date.now()-new Date(s))/3600000);};

// ─── SHEET ────────────────────────────────────────────────────────────────────
function sheetOpen(html){
  document.getElementById('sheet-inner').innerHTML=html;
  document.getElementById('sheet-bg').classList.add('open');
  setTimeout(()=>document.querySelector('.sheet .fi')?.focus(),120);
}
function sheetClose(){document.getElementById('sheet-bg').classList.remove('open');}
function sheetBgClick(e){if(e.target===document.getElementById('sheet-bg'))sheetClose();}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDash(){
  const clientes=S.arr('clientes');
  const prospeccao=S.arr('prospeccao');
  const leads=S.arr('leads');
  const orcamentos=S.arr('orcamentos');
  const followups=S.arr('followups');
  const td=today(), amanha=addDays(td,1);

  const b2=clientes.filter(c=>c.tipo==='B2').length;
  const b1=clientes.filter(c=>c.tipo==='B1').length;
  const leadsUrg=leads.filter(l=>l.estado==='novo'&&hoursAgo(l.data)>24).length;
  const fuUrg=followups.filter(f=>!f.feito&&f.data<=amanha);
  const orcPend=orcamentos.filter(o=>['enviado','aguarda','negociacao'].includes(o.estado));
  const semVisita=clientes.filter(c=>!c.ultimaVisita||diffDays(c.ultimaVisita,td)>35).length;
  const dow=new Date().getDay();
  const diasCampo={2:'Terça',3:'Quarta',4:'Quinta'};

  let html='';

  // Dia de campo ou escritório
  if(diasCampo[dow]){
    html+=`<div class="banner banner-green">🚗 Hoje é dia de campo (${diasCampo[dow]}) — vê a tua rota</div>`;
  } else if(dow===1||dow===5){
    html+=`<div class="banner banner-blue">🏠 ${dow===1?'Segunda':'Sexta'}-feira — dia de escritório. Trata leads, orçamentos e follow-ups.</div>`;
  }

  // Alertas urgentes
  if(leadsUrg>0) html+=`<div class="banner banner-red">⚡ ${leadsUrg} lead(s) online sem resposta há mais de 24h</div>`;
  if(fuUrg.length>0) html+=`<div class="banner banner-amber">📞 ${fuUrg.length} follow-up(s) para hoje ou amanhã</div>`;

  // Stats
  html+=`<div class="stats">
    <div class="stat"><div class="stat-lbl">Distribuidores ativos</div><div class="stat-val" style="color:var(--green3)">${b2}</div><div class="stat-sub">cliente ideal</div></div>
    <div class="stat"><div class="stat-lbl">Clientes diretos</div><div class="stat-val" style="color:var(--blue2)">${b1}</div><div class="stat-sub">orçamentos pontuais</div></div>
    <div class="stat"><div class="stat-lbl">Em prospeção</div><div class="stat-val" style="color:var(--amber2)">${prospeccao.length}</div><div class="stat-sub">tipo A — tabela enviada</div></div>
    <div class="stat"><div class="stat-lbl">Leads online</div><div class="stat-val" style="color:${leadsUrg>0?'var(--red2)':'var(--orange2)'}">${leads.filter(l=>l.estado==='novo').length}</div><div class="stat-sub">por responder</div></div>
  </div>`;

  // Funil de conversão
  html+=`<div class="sec-hdr">Funil Airpress</div>
  <div class="card"><div class="card-body">
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-bottom:10px;">
      <span style="background:rgba(245,158,11,.15);color:var(--amber2);padding:3px 10px;border-radius:20px;">A Prospeção (${prospeccao.length})</span>
      <span style="color:var(--text3);">→</span>
      <span style="background:rgba(59,130,246,.15);color:var(--blue2);padding:3px 10px;border-radius:20px;">B1 Direto (${b1})</span>
      <span style="color:var(--text3);">→</span>
      <span style="background:rgba(16,185,129,.15);color:var(--green3);padding:3px 10px;border-radius:20px;">⭐ B2 Dist. (${b2})</span>
    </div>

  </div></div>`;

  // Follow-ups urgentes
  if(fuUrg.length){
    html+=`<div class="sec-hdr">Follow-ups urgentes</div><div class="card">`;
    fuUrg.slice(0,4).forEach(f=>{
      const overdue=f.data<td;
      const cor=overdue?'var(--red)':f.data===td?'var(--amber)':'var(--green)';
      html+=`<div class="fu-item"><div class="fu-dot" style="background:${cor};margin-top:5px;"></div>
        <div class="fu-body"><div class="fu-title">${{chamada:'📞',visita:'🚗',email:'📧'}[f.tipo]||'📞'} ${f.nomeRef}</div>
        <div class="fu-sub">${f.motivo}</div></div>
        <div style="text-align:right;"><div style="font-size:11px;font-weight:500;color:${cor};">${overdue?'⚠️ Atraso':f.data===td?'Hoje':fmtDateShort(f.data)}</div>
        <button class="btn btn-xs btn-green" style="margin-top:4px;" onclick="marcarFuFeito('${f.id}')">✓</button></div></div>`;
    });
    html+=`</div>`;
  }

  // Leads por responder
  const leadsNovos=leads.filter(l=>l.estado==='novo').sort((a,b)=>a.data.localeCompare(b.data));
  if(leadsNovos.length){
    html+=`<div class="sec-hdr">Leads online por responder</div><div class="card">`;
    leadsNovos.slice(0,3).forEach(l=>{
      const h=hoursAgo(l.data);
      const cor=h>24?'var(--red2)':h>8?'var(--amber2)':'var(--green3)';
      html+=`<div class="list-item" onclick="openLeadDet('${l.id}')">
        <div class="avatar" style="background:rgba(249,115,22,.15);color:var(--orange2);font-size:18px;">📧</div>
        <div class="list-body"><div class="list-name">${l.nome||'(sem nome)'}</div>
        <div class="list-sub">${l.assunto||l.categoria||''}</div></div>
        <div style="text-align:right;"><div style="font-size:11px;color:${cor};font-weight:500;">${h<1?'<1h':h+'h'}</div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  // Orçamentos pendentes
  if(orcPend.length){
    html+=`<div class="sec-hdr">Orçamentos em aberto</div><div class="card">`;
    orcPend.slice(0,3).forEach(o=>{
      const prazoOk=!o.prazo||o.prazo>=td;
      html+=`<div class="list-item" onclick="openOrcDet('${o.id}')">
        <div class="list-body"><div class="list-name">${o.nomeRef}</div>
        <div class="list-sub">${o.categoria||''} · ${o.valor?'€'+o.valor:''}</div></div>

        ${o.prazo&&!prazoOk?'<div style="font-size:10px;color:var(--red2);margin-top:3px;">⚠️ vencido</div>':''}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  // Clientes sem visita
  if(semVisita>0){
    html+=`<div class="banner banner-amber" style="margin-top:4px;">🚗 ${semVisita} cliente(s) ativo(s) sem visita há mais de 35 dias</div>`;
  }

  document.getElementById('page-dash').innerHTML=html;
}

let clienteTab='todos', clienteSearch='';

  const b1=clientes.filter(c=>c.tipo==='B1');

  let filtered=clientes;
  if(clienteTab==='B2') filtered=b2;

  if(clienteSearch) filtered=filtered.filter(c=>c.nome.toLowerCase().includes(clienteSearch)||c.contacto?.toLowerCase().includes(clienteSearch)||c.distrito?.toLowerCase().includes(clienteSearch));

  let html=`<div class="tabs">

    html+=`<div class="empty"><div class="empty-icon">⭐</div><div class="empty-text">Sem clientes ainda</div><div class="empty-sub">Toca em ＋ para adicionar</div></div>`;
  } else {

      const pontoCor=dias<=14?'var(--green)':dias<=35?'var(--amber)':'var(--red)';
      const t=TIPO_LABELS[c.tipo]||TIPO_LABELS['B1'];

// ─── ROTA MENSAL ─────────────────────────────────────────────────────────────
let rotaMes=new Date().toISOString().slice(0,7);
function renderRota(){
  const clientes=S.arr('clientes');
  const prospeccao=S.arr('prospeccao');
  const td=today();
  const mesLabel=new Date(rotaMes+'-15').toLocaleDateString('pt-PT',{month:'long',year:'numeric'});

  let html=`<div class="banner banner-blue">📍 Base Aveiro · Ter/Qua/Qui em campo · Norte → Sul · ${DISTRITOS_ROTA.length} saídas/ciclo</div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
    <button class="btn btn-ghost btn-sm" onclick="rotaMudarMes(-1)">←</button>
    <div style="flex:1;text-align:center;font-size:14px;font-weight:600;">${mesLabel}</div>
    <button class="btn btn-ghost btn-sm" onclick="rotaMudarMes(1)">→</button>
  </div>`;

  DISTRITOS_ROTA.forEach((rota,i)=>{
    const numSaida=i+1;
    // Clientes neste destino
    const distNomes=rota.distritos||[rota.nome];
    const clientesRota=[...clientes,...prospeccao].filter(c=>distNomes.includes(c.distrito));
    const visitadosMes=clientesRota.filter(c=>c.ultimaVisita&&c.ultimaVisita.startsWith(rotaMes));
    const visitadosPct=clientesRota.length?Math.round(visitadosMes.length/clientesRota.length*100):0;
    const corGrupo=rota.grupo==='base'?'var(--teal2)':rota.grupo==='agrupado'?'var(--purple2)':'var(--blue2)';
    const saidaVisitada=visitadosMes.length>0;

    html+=`<div class="card">
      <div class="card-hdr">
        <div>
          <div style="font-size:13px;font-weight:600;">${numSaida}. ${rota.nome}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px;">${rota.grupo==='base'?'🏠 Base':rota.grupo==='agrupado'?'🔗 Agrupado':'📍 Individual'} · ${clientesRota.length} cliente(s)</div>
        </div>
        <span class="badge" style="background:${saidaVisitada?'rgba(16,185,129,.15)':'rgba(148,163,184,.1)'};color:${saidaVisitada?'var(--green3)':'var(--text3)'};">${saidaVisitada?'✓ Visitado':'Pendente'}</span>
      </div>
      ${clientesRota.length?`<div>
        ${clientesRota.map(c=>{
          const dias=c.ultimaVisita?diffDays(c.ultimaVisita,td):999;
          const visitMes=c.ultimaVisita&&c.ultimaVisita.startsWith(rotaMes);
          const cor=visitMes?'var(--green)':dias<=35?'var(--amber)':'var(--red)';
          const tipo=c.tipo?TIPO_LABELS[c.tipo]?.icon:'🔍';
          return `<div class="list-item" onclick="c_tipo_${c.tipo?'openClienteDet':'openProspDet'}('${c.id}')">
            <div class="client-dot" style="width:8px;height:8px;border-radius:50%;background:${cor};flex-shrink:0;"></div>
            <div class="list-body"><div class="list-name">${tipo} ${c.nome}</div>
            <div class="list-sub">${c.contacto||''} · ${visitMes?'✓ visitado este mês':dias>500?'nunca':dias+'d sem visita'}</div></div>
            <button class="btn btn-xs ${visitMes?'btn-ghost':'btn-green'}" onclick="event.stopPropagation();openRegistoVisita('${c.id}','${c.tipo?'cliente':'prospeccao'}')">${visitMes?'✓':'Visitar'}</button>
          </div>`;
        }).join('')}
      </div>`:`<div style="padding:12px 14px;font-size:13px;color:var(--text3);">Sem clientes neste distrito. Adiciona em ＋.</div>`}
    </div>`;
  });

  document.getElementById('page-rota').innerHTML=html;

  // Attach click handlers for mixed list
  document.querySelectorAll('[class*="c_tipo_"]').forEach(el=>{
    const fn=el.className.match(/c_tipo_(\w+)/)?.[1];
    if(fn==='openClienteDet') el.onclick=()=>openClienteDet(el.dataset?.id);
    if(fn==='openProspDet') el.onclick=()=>openProspDet(el.dataset?.id);
  });
}
function rotaMudarMes(d){
  const dt=new Date(rotaMes+'-15');
  dt.setMonth(dt.getMonth()+d);
  rotaMes=dt.toISOString().slice(0,7);
  renderRota();
}

function saveVisita(id, tipo){
  const lista=tipo==='cliente'?S.arr('clientes'):S.arr('prospeccao');
  const idx=lista.findIndex(x=>x.id===id); if(idx<0) return;
  const nota=v('rv-nota'), td=today();
  lista[idx].ultimaVisita=td;
  if(tipo==='prospeccao'){
    lista[idx].lojaAberta=v('rv-aberta')==='1';
    lista[idx].interesse=v('rv-int')||lista[idx].interesse;
    lista[idx].tabelaEntregue=lista[idx].tabelaEntregue||(v('rv-tab')==='1');
    if(!lista[idx].contacto&&nota) lista[idx].ultimaNota=nota;
  }
  if(nota){
    const ts=new Date().toLocaleDateString('pt-PT',{day:'numeric',month:'short'});
    lista[idx].notas=(lista[idx].notas?lista[idx].notas+'\n\n':'')+`[${ts}] ${nota}`;
  }
  S.set(tipo==='cliente'?'clientes':'prospeccao',lista);
  const prox=v('rv-prox'), proxData=v('rv-data');
  if(prox&&proxData){
    const fus=S.arr('followups');
    fus.push({id:S.id(),refId:id,nomeRef:lista[idx].nome,tipo:prox,motivo:nota||'Follow-up pós-visita',data:proxData,feito:false});
    S.set('followups',fus);
  }
  sheetClose(); renders[currentPage]&&renders[currentPage]();
}

      :`<select class="fi" id="no-csel"><option value="">— Selecionar —</option>${clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}<option value="_livre">Outro (escrever)</option></select>`}
      ${refId?'':`<input class="fi" id="no-cnome" placeholder="Nome do cliente" style="margin-top:6px;display:none;">`}
    </div>
    <div class="fg"><label>Categoria do produto</label>
      <select class="fi" id="no-cat" onchange="document.getElementById('no-cat-outro').style.display=this.value==='Outros'?'block':'none'">
        ${CATEGORIAS.map(c=>`<option>${c}</option>`).join('')}
      </select>
    </div>
    <div class="fg"><label>Descrição rápida</label>
      <textarea class="fi" id="no-desc" rows="2" placeholder="Ex: 2 compressores Blue Plus 50L + kit mangueiras"></textarea></div>
    <div class="fg-row">
      <div class="fg"><label>Valor (€)</label><input class="fi" id="no-val" placeholder="Ex: 1.200"></div>
      <div class="fg"><label>Canal</label><select class="fi" id="no-canal">
        <option value="email">📧 Email</option>
        <option value="telefone">📞 Telefone</option>
        <option value="visita">🚗 Visita</option>
        <option value="site">🌐 Site</option>
      </select></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>Estado</label><select class="fi" id="no-est">
        <option value="enviado">Enviado</option>
        <option value="aguarda">Aguarda resposta</option>
        <option value="negociacao">Negociação</option>
      </select></div>
      <div class="fg"><label>Prazo</label><input class="fi" id="no-prazo" type="date" value="${addDays(today(),7)}"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="sheetClose()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNovoOrc('${refId||''}','${esc(refNome||'')}')">Guardar</button>
    </div>`);
  if(!refId){
    document.getElementById('no-csel').onchange=function(){
      document.getElementById('no-cnome').style.display=this.value==='_livre'?'block':'none';
    };
  }
}
function saveNovoOrc(refId,refNome){
  const csel=document.getElementById('no-csel');
  const realId=refId||(csel&&csel.value!=='_livre'?csel.value:'');
  const cnome=refNome||(realId?S.arr('clientes').find(c=>c.id===realId)?.nome:'')||(document.getElementById('no-cnome')?.value||'');
  if(!cnome){alert('Seleciona ou escreve o nome do cliente');return;}
  const orcs=S.arr('orcamentos');
  orcs.push({id:S.id(),refId:realId,nomeRef:cnome,categoria:v('no-cat'),descricao:v('no-desc'),valor:v('no-val'),canal:v('no-canal')||'email',estado:v('no-est')||'enviado',data:today(),prazo:v('no-prazo'),notas:''});
  S.set('orcamentos',orcs); sheetClose(); renders[currentPage]&&renders[currentPage]();
}

// ─── NOVO FOLLOW-UP ───────────────────────────────────────────────────────────
function openNovoFu(refId, refNome){
  const clientes=S.arr('clientes');
  sheetOpen(`<div class="sheet-title">Agendar Follow-up</div>
    <div class="fg"><label>Cliente / Referência</label>
      ${refId?`<input class="fi" value="${esc(refNome||'')}" readonly style="opacity:.7;">`
      :`<select class="fi" id="nf-csel"><option value="">— Selecionar —</option>${clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}</select>`}</div>
    <div class="fg"><label>Tipo</label><select class="fi" id="nf-tipo">
      <option value="chamada">📞 Chamada</option>
      <option value="visita">🚗 Visita</option>
      <option value="email">📧 Email</option>
    </select></div>
    <div class="fg"><label>O que tratar</label><input class="fi" id="nf-motivo" placeholder="Ex: Confirmar recepção orçamento. Saber decisão."></div>
    <div class="fg"><label>Data</label><input class="fi" id="nf-data" type="date" value="${addDays(today(),3)}"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="sheetClose()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNovoFu('${refId||''}','${esc(refNome||'')}')">Agendar</button>
    </div>`);
}
function saveNovoFu(refId,refNome){
  const motivo=v('nf-motivo'); if(!motivo){alert('Escreve o motivo do follow-up');return;}
  const csel=document.getElementById('nf-csel');
  const realId=refId||(csel?csel.value:'');
  const nome=refNome||(realId?S.arr('clientes').find(c=>c.id===realId)?.nome:'')
  const fus=S.arr('followups');
  fus.push({id:S.id(),refId:realId,nomeRef:nome||'(sem nome)',tipo:v('nf-tipo')||'chamada',motivo,data:v('nf-data')||today(),feito:false});
  S.set('followups',fus); sheetClose(); renders[currentPage]&&renders[currentPage]();
}

function saveNovoProspecto(){

  const pros=S.arr('prospeccao');
  pros.push({id:S.id(),nome,distrito:v('np-dist'),lojaAberta:v('np-aberta')==='1',interesse:v('np-int'),tabelaEntregue:v('np-tab')==='1',contacto:v('np-cont'),tel:v('np-tel'),notas:v('np-notas'),ultimaVisita:today()});
  S.set('prospeccao',pros); sheetClose(); renderProspeccao();
  navTo('prospeccao',document.querySelector('.nav-btn:nth-child(3)'),'Prospeção','Tipo A — Tabela de preços');

function openNovoCliente(){
  sheetOpen(`<div class="sheet-title">Novo Cliente Ativo</div>

      <option value="B1">B1 — Cliente Direto (orçamentos pontuais)</option>

      <div class="fg"><label>Contacto</label><input class="fi" id="nc-cont" placeholder="Nome da pessoa"></div>

// ─── FAB ──────────────────────────────────────────────────────────────────────
function openFab(){
  const opts=[
    {icon:'⭐',lbl:'Novo Cliente Ativo',sub:'B1 direto ou B2 distribuidor',fn:'openNovoCliente()'},
    {icon:'🔍',lbl:'Novo Prospecto',sub:'Tipo A — entregar tabela',fn:'openNovoProspecto()'},
    {icon:'📧',lbl:'Novo Lead Online',sub:'Tipo C — site / email',fn:'openNovoLead()'},
    {icon:'📋',lbl:'Novo Orçamento',sub:'Pedido de preço',fn:"openNovoOrc('','')"},
    {icon:'📞',lbl:'Follow-up',sub:'Agendar chamada ou visita',fn:"openNovoFu('','')"},
  ];
  sheetOpen(`<div class="sheet-title">Adicionar</div>
    ${opts.map(o=>`<div class="list-item" style="border-radius:var(--r);background:var(--bg3);margin-bottom:7px;" onclick="${o.fn};sheetClose()">
      <div class="avatar" style="background:var(--bg2);font-size:22px;">${o.icon}</div>
      <div class="list-body"><div class="list-name">${o.lbl}</div><div class="list-sub">${o.sub}</div></div>
    </div>`).join('')}
    <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px;">
      <button class="btn btn-danger btn-sm" onclick="sheetClose();confirmarLimpar()">🗑️ Limpar todos os dados</button>
    </div>`);
}

function deleteItem(store, id){
  if(!confirm('Eliminar este registo?')) return;
  S.set(store, S.arr(store).filter(x=>x.id!==id));
  renders[currentPage]&&renders[currentPage]();
}

function confirmarLimpar(){
  sheetOpen(`<div class="sheet-title" style="color:var(--red2);">⚠️ Limpar todos os dados</div>
    <div style="font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:20px;">
      Isto apaga <strong style="color:var(--text);">todos os clientes, prospectos, leads, orçamentos e follow-ups</strong>.<br><br>
      <strong style="color:var(--red2);">Esta acção não pode ser desfeita.</strong>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="sheetClose()">Cancelar</button>
      <button class="btn btn-danger" onclick="limparTudo()">Confirmar — limpar tudo</button>
    </div>`);
}
function limparTudo(){
  ['clientes','prospeccao','leads','orcamentos','followups'].forEach(k=>localStorage.removeItem('ap_'+k));
  sheetClose();
  setTimeout(()=>{ renders[currentPage]&&renders[currentPage](); },200);
}

// ─── RENDER MAP ───────────────────────────────────────────────────────────────
const renders={
  dash:renderDash,
  clientes:renderClientes,
  prospeccao:renderProspeccao,
  leads:renderLeads,
  orcamentos:renderOrcamentos,
  followups:renderFollowups,
  rota:renderRota,
};

// ─── BOOT ─────────────────────────────────────────────────────────────────────
renderDash();
</script>
