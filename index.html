<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="VendasPT">
<meta name="theme-color" content="#111827">
<title>VendasPT CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111827;--bg2:#1f2937;--bg3:#374151;
  --card:#1f2937;--card2:#2d3748;
  --border:#374151;--border2:#4b5563;
  --text:#f9fafb;--text2:#d1d5db;--text3:#9ca3af;
  --green:#10b981;--green2:#059669;--green3:#34d399;
  --blue:#3b82f6;--blue2:#60a5fa;
  --amber:#f59e0b;--amber2:#fcd34d;
  --red:#ef4444;--red2:#fca5a5;
  --purple:#8b5cf6;--purple2:#a78bfa;
  --teal:#14b8a6;
  --r:10px;--rl:14px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.4;}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.topbar{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:54px;}
.topbar-title{font-size:17px;font-weight:600;color:var(--text);}
.topbar-sub{font-size:12px;color:var(--text3);margin-top:1px;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);}
.page{display:none;padding:16px;}
.page.active{display:block;}
.bottom-nav{display:grid;grid-template-columns:repeat(5,1fr);background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;cursor:pointer;color:var(--text3);border:none;background:none;font-family:var(--font);gap:3px;transition:color .15s;}
.nav-btn.active{color:var(--green);}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-size:10px;font-weight:500;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--r);border:none;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:active{background:var(--green2);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:active{background:var(--bg3);}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-sm{padding:6px 12px;font-size:13px;}
.btn-xs{padding:4px 9px;font-size:12px;border-radius:7px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:12px;overflow:hidden;}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:600;color:var(--text);}
.card-body{padding:14px 16px;}

/* STAT GRID */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.stat-val{font-size:22px;font-weight:700;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.bg-green{background:rgba(16,185,129,.15);color:var(--green3);}
.bg-amber{background:rgba(245,158,11,.15);color:var(--amber2);}
.bg-red{background:rgba(239,68,68,.15);color:var(--red2);}
.bg-blue{background:rgba(59,130,246,.15);color:var(--blue2);}
.bg-purple{background:rgba(139,92,246,.15);color:var(--purple2);}
.bg-gray{background:var(--bg3);color:var(--text3);}

/* LIST */
.list-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.list-item:last-child{border-bottom:none;}
.list-item:active{background:var(--card2);}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.list-body{flex:1;min-width:0;}
.list-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-sub{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-right{text-align:right;flex-shrink:0;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:14px;}
.search-inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px 11px 40px;font-size:15px;font-family:var(--font);color:var(--text);outline:none;}
.search-inp:focus{border-color:var(--green);}
.search-inp::placeholder{color:var(--text3);}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);pointer-events:none;}

/* FORM / SHEET */
.sheet-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:flex-end;}
.sheet-backdrop.open{display:flex;}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:8px 18px calc(20px + env(safe-area-inset-bottom,0px));-webkit-overflow-scrolling:touch;}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 18px;}
.sheet-title{font-size:18px;font-weight:700;margin-bottom:18px;color:var(--text);}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:12px 13px;font-size:15px;font-family:var(--font);color:var(--text);outline:none;-webkit-appearance:none;appearance:none;}
.fi:focus{border-color:var(--green);}
.fi::placeholder{color:var(--text3);}
select.fi option{background:var(--bg2);}
textarea.fi{resize:vertical;min-height:80px;}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-actions{display:flex;gap:10px;margin-top:6px;padding-bottom:4px;}
.form-actions .btn{flex:1;}

/* DETAIL VIEW */
.detail-back{display:flex;align-items:center;gap:6px;color:var(--green);font-size:14px;font-weight:500;margin-bottom:14px;cursor:pointer;padding:4px 0;}
.detail-hero{background:var(--card);border-radius:var(--rl);padding:18px;margin-bottom:12px;}
.detail-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;margin-bottom:12px;}
.detail-name{font-size:20px;font-weight:700;}
.detail-meta{font-size:13px;color:var(--text3);margin-top:3px;}
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.field-box{background:var(--card);border-radius:var(--r);padding:11px 13px;}
.field-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.field-val{font-size:14px;font-weight:500;color:var(--text);}

/* PROGRESS */
.prog-wrap{background:var(--bg3);border-radius:6px;height:7px;overflow:hidden;}
.prog-fill{height:100%;border-radius:6px;transition:width .5s ease;}

/* SECTION HDR */
.sec-hdr{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin:16px 0 8px;display:flex;align-items:center;justify-content:space-between;}

/* QUICK REG — big colored buttons */
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.quick-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:18px 14px;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.quick-btn:active{transform:scale(.97);}
.quick-btn .qi{font-size:28px;}
.quick-btn .ql{font-size:13px;font-weight:600;color:var(--text);}
.quick-btn .qs{font-size:11px;color:var(--text3);}
.quick-btn.green{border-color:var(--green);background:rgba(16,185,129,.08);}
.quick-btn.amber{border-color:var(--amber);background:rgba(245,158,11,.08);}
.quick-btn.blue{border-color:var(--blue);background:rgba(59,130,246,.08);}
.quick-btn.red{border-color:var(--red);background:rgba(239,68,68,.08);}

/* ROTA DAY */
.rota-day{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden;}
.rota-day-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.rota-day-name{font-size:15px;font-weight:600;}
.rota-day-dist{font-size:12px;color:var(--text3);}
.client-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.client-row:last-child{border-bottom:none;}
.client-row:active{background:var(--card2);}
.client-status{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.client-info{flex:1;min-width:0;}
.client-name{font-size:14px;font-weight:500;}
.client-last{font-size:11px;color:var(--text3);}

/* ORCAMENTOS */
.orc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s;}
.orc-card:active{background:var(--card2);}
.orc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.orc-name{font-size:14px;font-weight:600;}
.orc-val{font-size:16px;font-weight:700;color:var(--green3);}
.orc-desc{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.5;}
.orc-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text3);}
.orc-border-green{border-left:3px solid var(--green);}
.orc-border-amber{border-left:3px solid var(--amber);}
.orc-border-blue{border-left:3px solid var(--blue);}
.orc-border-red{border-left:3px solid var(--red);}

/* FOLLOWUP */
.fu-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);}
.fu-item:last-child{border-bottom:none;}
.fu-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.fu-body{flex:1;}
.fu-title{font-size:14px;font-weight:500;}
.fu-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.fu-date{font-size:12px;font-weight:500;}
.fu-overdue{color:var(--red);}
.fu-today{color:var(--amber2);}
.fu-soon{color:var(--green3);}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
.tgl{position:relative;width:44px;height:24px;flex-shrink:0;}
.tgl input{opacity:0;width:0;height:0;position:absolute;}
.tgl-track{position:absolute;inset:0;background:var(--bg3);border-radius:12px;transition:.25s;cursor:pointer;}
.tgl-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.25s;pointer-events:none;}
.tgl input:checked~.tgl-track{background:var(--green);}
.tgl input:checked~.tgl-thumb{transform:translateX(20px);}

/* NOTIF BANNER */
.banner{border-radius:var(--r);padding:11px 14px;margin-bottom:12px;font-size:13px;display:flex;gap:10px;align-items:flex-start;line-height:1.5;}
.banner-amber{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--amber2);}
.banner-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red2);}
.banner-green{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--green3);}
.banner-blue{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--blue2);}

/* CHART BARS */
.ch-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.ch-lbl{font-size:12px;color:var(--text2);width:90px;flex-shrink:0;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.ch-fill{height:100%;border-radius:4px;}
.ch-val{font-size:12px;color:var(--text3);width:48px;text-align:right;flex-shrink:0;}

/* NOTA BOX */
.nota-box{background:var(--bg3);border-radius:var(--r);padding:11px 13px;font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px;white-space:pre-wrap;}

/* EMPTY */
.empty{text-align:center;padding:44px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:15px;color:var(--text2);margin-bottom:4px;}
.empty-sub{font-size:13px;}

/* FAB */
.fab{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom,0px));right:18px;width:54px;height:54px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;box-shadow:0 4px 16px rgba(16,185,129,.35);transition:transform .15s;}
.fab:active{transform:scale(.92);}

::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">VendasPT</div>
      <div class="topbar-sub" id="topbar-sub">Guia de Vendas</div>
    </div>
    <div id="topbar-actions" style="display:flex;gap:8px;"></div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="main">

    <!-- ===== DASHBOARD ===== -->
    <div class="page active" id="page-dash">
      <div class="stats" id="dash-stats"></div>
      <div id="dash-alertas"></div>
      <div class="sec-hdr">Hoje — <span id="dash-hoje"></span></div>
      <div id="dash-hoje-card"></div>
      <div class="sec-hdr">Follow-ups para hoje/amanhã</div>
      <div class="card" id="dash-fu"></div>
      <div class="sec-hdr">Orçamentos aguardam resposta</div>
      <div class="card" id="dash-orc"></div>
    </div>

    <!-- ===== CLIENTES ===== -->
    <div class="page" id="page-clientes">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search-inp" type="text" placeholder="Pesquisar clientes..." oninput="filterClientes(this.value)">
      </div>
      <div id="dist-filter" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;"></div>
      <div id="clientes-list"></div>
    </div>

    <!-- ===== ROTA ===== -->
    <div class="page" id="page-rota">
      <div class="banner banner-blue" style="margin-bottom:14px;">
        <span>📍</span>
        <span>Ter · Qua · Qui em terreno &nbsp;·&nbsp; Base Aveiro &nbsp;·&nbsp; Toca num cliente para registar visita</span>
      </div>
      <div class="sec-hdr">Semana atual — <span id="rota-semana"></span></div>
      <div id="rota-semanas" style="display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;"></div>
      <div id="rota-content"></div>
    </div>

    <!-- ===== ORÇAMENTOS ===== -->
    <div class="page" id="page-orc">
      <div id="orc-filter" style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;"></div>
      <div id="orc-list"></div>
    </div>

    <!-- ===== FOLLOWUPS ===== -->
    <div class="page" id="page-fu">
      <div id="fu-list"></div>
    </div>

    <!-- ===== DETALHE CLIENTE ===== -->
    <div class="page" id="page-cliente-det">
      <div class="detail-back" onclick="navBack()">← Voltar</div>
      <div id="det-content"></div>
    </div>

  </div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openFab()">＋</button>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="navTo('dash',this,'VendasPT','Guia de Vendas')">
      <span class="nav-icon">📊</span><span class="nav-label">Início</span>
    </button>
    <button class="nav-btn" onclick="navTo('clientes',this,'Clientes','Todos os clientes')">
      <span class="nav-icon">👥</span><span class="nav-label">Clientes</span>
    </button>
    <button class="nav-btn" onclick="navTo('rota',this,'Rota Semanal','Ter · Qua · Qui')">
      <span class="nav-icon">🗺️</span><span class="nav-label">Rota</span>
    </button>
    <button class="nav-btn" onclick="navTo('orc',this,'Orçamentos','Pedidos de preço')">
      <span class="nav-icon">📋</span><span class="nav-label">Orçamentos</span>
    </button>
    <button class="nav-btn" onclick="navTo('fu',this,'Follow-ups','Chamadas agendadas')">
      <span class="nav-icon">📞</span><span class="nav-label">Follow-up</span>
    </button>
  </div>
</div>

<!-- ===== SHEET / MODAL ===== -->
<div class="sheet-backdrop" id="sheet-bg" onclick="sheetClose(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-inner"></div>
  </div>
</div>

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
let currentPage='dash';
let prevPage='dash';
function navTo(page,btn,title,sub){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if(btn) btn.classList.add('active');
  document.getElementById('topbar-title').textContent=title||'VendasPT';
  document.getElementById('topbar-sub').textContent=sub||'';
  document.getElementById('topbar-actions').innerHTML='';
  prevPage=currentPage; currentPage=page;
  renderPage(page);
  document.getElementById('fab').style.display=(page==='cliente-det')?'none':'flex';
}
function navBack(){navTo(prevPage,document.querySelector('.nav-btn.active'));}

function renderPage(p){
  if(p==='dash') renderDash();
  else if(p==='clientes') renderClientes();
  else if(p==='rota') renderRota();
  else if(p==='orc') renderOrc();
  else if(p==='fu') renderFu();
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDash(){
  const clientes=S.arr('clientes');
  const orcamentos=S.arr('orcamentos');
  const followups=S.arr('followups');
  const hoje=todayStr();
  const amanha=addDays(hoje,1);

  // stats
  const pendFu=followups.filter(f=>!f.feito&&f.data<=amanha).length;
  const orcPend=orcamentos.filter(o=>o.estado==='aguarda'||o.estado==='negociacao'||o.estado==='enviado').length;
  const semVisita=clientes.filter(c=>!c.ultimaVisita||daysDiff(c.ultimaVisita,hoje)>35).length;
  const totalOrcPend=orcamentos.filter(o=>o.estado==='aguarda'||o.estado==='negociacao').reduce((s,o)=>s+parseFloat(o.valor.replace(/[^\d.]/g,'')||0),0);

  document.getElementById('dash-stats').innerHTML=`
    <div class="stat"><div class="stat-lbl">Orçamentos em aberto</div><div class="stat-val" style="color:var(--green3)">€${totalOrcPend.toLocaleString('pt')}</div><div class="stat-sub">${orcPend} pedidos activos</div></div>
    <div class="stat"><div class="stat-lbl">Follow-ups urgentes</div><div class="stat-val" style="color:${pendFu>0?'var(--amber2)':'var(--green3)'}">${pendFu}</div><div class="stat-sub">hoje e amanhã</div></div>
    <div class="stat"><div class="stat-lbl">Clientes</div><div class="stat-val">${clientes.length}</div><div class="stat-sub">${semVisita} sem visita >35 dias</div></div>
    <div class="stat"><div class="stat-lbl">Sem visita recente</div><div class="stat-val" style="color:${semVisita>0?'var(--red2)':'var(--green3)'}">${semVisita}</div><div class="stat-sub">>35 dias sem contacto</div></div>`;

  // alertas
  let alertas='';
  const vencidos=orcamentos.filter(o=>o.prazo&&o.prazo<hoje&&o.estado!=='ganho'&&o.estado!=='perdido');
  if(vencidos.length) alertas+=`<div class="banner banner-red">⚠️ ${vencidos.length} orçamento(s) com prazo vencido — verificar estado</div>`;
  if(semVisita>0) alertas+=`<div class="banner banner-amber">🚗 ${semVisita} cliente(s) sem visita há mais de 35 dias</div>`;
  const fuHoje=followups.filter(f=>!f.feito&&f.data===hoje);
  if(fuHoje.length) alertas+=`<div class="banner banner-green">📞 ${fuHoje.length} follow-up(s) para hoje</div>`;
  document.getElementById('dash-alertas').innerHTML=alertas;

  // hoje
  const dow=new Date().getDay();
  const diasTerreno={2:'Terça',3:'Quarta',4:'Quinta'};
  document.getElementById('dash-hoje').textContent=new Date().toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'});
  if(diasTerreno[dow]){
    document.getElementById('dash-hoje-card').innerHTML=`<div class="banner banner-green">🚗 Dia de terreno! Vê a tua rota desta semana.</div><button class="btn btn-green btn-sm" onclick="navTo('rota',null,'Rota Semanal','Ter · Qua · Qui')" style="margin-bottom:12px;">Ver rota de hoje</button>`;
  } else if(dow===1||dow===5){
    document.getElementById('dash-hoje-card').innerHTML=`<div class="banner banner-blue">🏠 Dia de escritório — ideal para orçamentos e follow-ups</div>`;
  } else {
    document.getElementById('dash-hoje-card').innerHTML=`<div class="banner banner-blue">📅 Fim de semana</div>`;
  }

  // fu urgentes
  const fuUrg=followups.filter(f=>!f.feito&&f.data<=amanha).sort((a,b)=>a.data.localeCompare(b.data));
  document.getElementById('dash-fu').innerHTML=fuUrg.length?fuUrg.slice(0,4).map(f=>fuItemHTML(f)).join(''):'<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Sem follow-ups urgentes</div></div>';

  // orc aguarda
  const orcAg=orcamentos.filter(o=>o.estado==='aguarda'||o.estado==='negociacao').sort((a,b)=>a.prazo?.localeCompare(b.prazo||''));
  document.getElementById('dash-orc').innerHTML=orcAg.length?orcAg.slice(0,3).map(o=>orcItemHTML(o)).join(''):'<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Sem orçamentos pendentes</div></div>';
}

// ─── CLIENTES ─────────────────────────────────────────────────────────────────
let clienteFilter='';
let distritoFilter='';
function renderClientes(){
  const clientes=S.arr('clientes');
  const distritos=[...new Set(clientes.map(c=>c.distrito))].sort();
  
  document.getElementById('dist-filter').innerHTML=[
    `<button class="btn btn-sm ${distritoFilter===''?'btn-green':'btn-ghost'}" onclick="setDistFilter('')">Todos</button>`,
    ...distritos.map(d=>`<button class="btn btn-sm ${distritoFilter===d?'btn-green':'btn-ghost'}" onclick="setDistFilter('${d}')">${d}</button>`)
  ].join('');

  const filtered=clientes.filter(c=>{
    const matchSearch=!clienteFilter||c.nome.toLowerCase().includes(clienteFilter)||c.contacto.toLowerCase().includes(clienteFilter)||c.distrito.toLowerCase().includes(clienteFilter);
    const matchDist=!distritoFilter||c.distrito===distritoFilter;
    return matchSearch&&matchDist;
  });

  const hoje=todayStr();
  document.getElementById('clientes-list').innerHTML=filtered.length?`<div class="card">${filtered.map(c=>{
    const dias=c.ultimaVisita?daysDiff(c.ultimaVisita,hoje):999;
    const cor=dias<=14?'var(--green)':dias<=35?'var(--amber)':'var(--red)';
    const initials=c.nome.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const avatarCor=c.hot?'rgba(245,158,11,.2)':'rgba(59,130,246,.15)';
    const textCor=c.hot?'var(--amber2)':'var(--blue2)';
    return `<div class="list-item" onclick="openCliente('${c.id}')">
      <div class="avatar" style="background:${avatarCor};color:${textCor};">${initials}</div>
      <div class="list-body">
        <div class="list-name">${c.nome}</div>
        <div class="list-sub">${c.contacto} · ${c.distrito}</div>
      </div>
      <div class="list-right">
        <div style="width:10px;height:10px;border-radius:50%;background:${cor};margin-left:auto;margin-bottom:4px;"></div>
        <div style="font-size:11px;color:var(--text3);">${dias>365?'nunca':dias+'d'}</div>
      </div>
    </div>`;
  }).join('')}</div>`:'<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">Sem resultados</div></div>';
}
function filterClientes(v){clienteFilter=v.toLowerCase();renderClientes();}
function setDistFilter(d){distritoFilter=d;renderClientes();}

// ─── ORÇAMENTOS ───────────────────────────────────────────────────────────────
let orcFilter='todos';
function renderOrc(){
  const estados=['todos','enviado','aguarda','negociacao','ganho','perdido'];
  const labels={todos:'Todos',enviado:'Enviado',aguarda:'Aguarda',negociacao:'Negociação',ganho:'Ganho',perdido:'Perdido'};
  document.getElementById('orc-filter').innerHTML=estados.map(e=>
    `<button class="btn btn-sm ${orcFilter===e?'btn-green':'btn-ghost'}" onclick="setOrcFilter('${e}')">${labels[e]}</button>`
  ).join('');
  const orcamentos=S.arr('orcamentos');
  const filtered=orcFilter==='todos'?orcamentos:orcamentos.filter(o=>o.estado===orcFilter);
  filtered.sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  document.getElementById('orc-list').innerHTML=filtered.length?filtered.map(o=>orcItemHTML(o)).join(''):'<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Sem orçamentos</div><div class="empty-sub">Toca em ＋ para adicionar</div></div>';
}
function setOrcFilter(f){orcFilter=f;renderOrc();}

function orcItemHTML(o){
  const borderMap={enviado:'orc-border-blue',aguarda:'orc-border-amber',negociacao:'orc-border-amber',ganho:'orc-border-green',perdido:'orc-border-red'};
  const badgeMap={enviado:'bg-blue',aguarda:'bg-amber',negociacao:'bg-purple',ganho:'bg-green',perdido:'bg-red'};
  const lbl={enviado:'Enviado',aguarda:'Aguarda resp.',negociacao:'Negociação',ganho:'Ganho ✓',perdido:'Perdido'};
  const canalIcon={email:'📧',telefone:'📞',outro:'💬'};
  return `<div class="orc-card ${borderMap[o.estado]||''}" onclick="openOrcDet('${o.id}')">
    <div class="orc-top">
      <div><div class="orc-name">${o.clienteNome}</div><div style="font-size:11px;color:var(--text3);margin-top:2px;">${canalIcon[o.canal]||'📧'} ${o.canal} · ${fmtDate(o.data)}</div></div>
      <div><div class="orc-val">€${o.valor}</div><span class="badge ${badgeMap[o.estado]||'bg-gray'}">${lbl[o.estado]||o.estado}</span></div>
    </div>
    <div class="orc-desc">${o.descricao}</div>
    <div class="orc-meta">
      <span>${o.prazo?'Prazo: '+fmtDate(o.prazo):'Sem prazo'}</span>
      ${o.notas?`<span style="color:var(--blue2);">📝 tem nota</span>`:''}
    </div>
  </div>`;
}

// ─── FOLLOW-UPS ───────────────────────────────────────────────────────────────
function renderFu(){
  const followups=S.arr('followups').sort((a,b)=>a.data.localeCompare(b.data));
  const pendentes=followups.filter(f=>!f.feito);
  const feitos=followups.filter(f=>f.feito);
  let html='';
  if(pendentes.length){
    html+=`<div class="sec-hdr">Pendentes (${pendentes.length})</div><div class="card">${pendentes.map(f=>fuItemHTML(f)).join('')}</div>`;
  }
  if(feitos.length){
    html+=`<div class="sec-hdr">Concluídos</div><div class="card">${feitos.slice(-5).reverse().map(f=>fuItemHTML(f)).join('')}</div>`;
  }
  if(!followups.length) html='<div class="empty"><div class="empty-icon">📞</div><div class="empty-text">Sem follow-ups</div><div class="empty-sub">Toca em ＋ para agendar</div></div>';
  document.getElementById('fu-list').innerHTML=html;
}

function fuItemHTML(f){
  const hoje=todayStr();
  const diff=daysDiff(hoje,f.data);
  let dateCls='fu-soon',dateStr=fmtDate(f.data);
  if(f.feito){dateCls='';dateStr='✓ '+dateStr;}
  else if(f.data<hoje){dateCls='fu-overdue';dateStr='⚠️ '+dateStr;}
  else if(f.data===hoje){dateCls='fu-today';dateStr='Hoje!';}
  else if(diff<=2){dateCls='fu-today';}
  const tipoIcon={chamada:'📞',visita:'🚗',email:'📧'};
  const cor=f.feito?'var(--text3)':f.data<hoje?'var(--red)':f.data===hoje?'var(--amber)':'var(--green)';
  return `<div class="fu-item">
    <div class="fu-dot" style="background:${cor};margin-top:5px;"></div>
    <div class="fu-body">
      <div class="fu-title">${tipoIcon[f.tipo]||'📞'} ${f.clienteNome}</div>
      <div class="fu-sub">${f.motivo}</div>
    </div>
    <div>
      <div class="fu-date ${dateCls}" style="text-align:right;margin-bottom:4px;">${dateStr}</div>
      ${!f.feito?`<button class="btn btn-xs btn-green" onclick="marcarFuFeito('${f.id}')">Feito ✓</button>`:''}
    </div>
  </div>`;
}

// ─── SHEET HELPERS ────────────────────────────────────────────────────────────
function sheetOpen(html){
  document.getElementById('sheet-inner').innerHTML=html;
  document.getElementById('sheet-bg').classList.add('open');
  setTimeout(()=>document.querySelector('.sheet .fi')?.focus(),100);
}
function sheetClose(e){
  if(e&&e.target!==document.getElementById('sheet-bg')) return;
  document.getElementById('sheet-bg').classList.remove('open');
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function esc(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function todayStr(){return new Date().toISOString().slice(0,10);}
function addDays(dateStr,n){const d=new Date(dateStr);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function daysDiff(a,b){return Math.round((new Date(b)-new Date(a))/(1000*60*60*24));}
function fmtDate(s){if(!s) return '—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('pt-PT',{day:'numeric',month:'short',year:'numeric'});}

let distTab = 'ativos';
let distSearch = '';

function renderDist(){
  const todos = S.arr('distribuidores');
  const ativos = todos.filter(d => d.estado === 'ativo');
  const potenciais = todos.filter(d => d.estado === 'potencial');
  const hoje = todayStr();
  const semVisita = ativos.filter(d => !d.ultimaVisita || daysDiff(d.ultimaVisita, hoje) > 35).length;

  distPage.innerHTML = `
    <div style="padding:16px;">
      <div class="stats" style="grid-template-columns:1fr 1fr 1fr;gap:8px;">
        <div class="stat"><div class="stat-lbl">Ativos</div><div class="stat-val" style="color:var(--green3)">${ativos.length}</div><div class="stat-sub">distribuidores</div></div>
        <div class="stat"><div class="stat-lbl">Potenciais</div><div class="stat-val" style="color:var(--amber2)">${potenciais.length}</div><div class="stat-sub">a trabalhar</div></div>
        <div class="stat"><div class="stat-lbl">Sem visita</div><div class="stat-val" style="color:${semVisita>0?'var(--red2)':'var(--green3)'}">${semVisita}</div><div class="stat-sub">>35 dias</div></div>
      </div>

      <div style="display:flex;gap:7px;margin-bottom:14px;">
        <button class="btn btn-sm ${distTab==='ativos'?'btn-green':'btn-ghost'}" onclick="setDistTab('ativos')">Ativos (${ativos.length})</button>
        <button class="btn btn-sm ${distTab==='potenciais'?'btn-green':'btn-ghost'}" onclick="setDistTab('potenciais')">Prospeção (${potenciais.length})</button>
        <button class="btn btn-sm ${distTab==='tabela'?'btn-blue':'btn-ghost'}" onclick="setDistTab('tabela')">📊 Tabela</button>
        <button class="btn btn-sm ${distTab==='rapel'?'btn-blue':'btn-ghost'}" onclick="setDistTab('rapel')">🎯 Rápel</button>
      </div>

      ${distTab==='ativos' ? renderDistAtivos(ativos) : ''}
      ${distTab==='potenciais' ? renderDistPotenciais(potenciais) : ''}

      ${distTab==='rapel' ? renderRapel() : ''}
    </div>`;
}

function setDistTab(t){ distTab=t; renderDist(); }

function renderDistAtivos(ativos){
  const hoje = todayStr();
  if(!ativos.length) return `<div class="empty"><div class="empty-icon">🏪</div><div class="empty-text">Sem distribuidores ativos</div><div class="empty-sub">Adiciona com o botão ＋</div></div>`;
  return `<div class="card">${ativos.map(d => {
    const dias = d.ultimaVisita ? daysDiff(d.ultimaVisita, hoje) : 999;
    const cor = dias<=14?'var(--green)':dias<=35?'var(--amber)':'var(--red)';
    const initials = d.nome.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    return `<div class="list-item" onclick="openDist('${d.id}')">
      <div class="avatar" style="background:rgba(16,185,129,.15);color:var(--green3);font-size:13px;">${initials}</div>
      <div class="list-body">
        <div class="list-name">${d.nome}</div>

}

        <option value="sim">Sim — quer avançar</option>
        <option value="talvez">Talvez — precisa de pensar</option>
        <option value="nao">Não — sem interesse</option>
      </select></div>
    <div class="fg"><label>Entregaste tabela de preços?</label>
      <select class="fi" id="rvd-tab"><option value="1">Sim</option><option value="0">Não</option></select></div>

    <div class="fg"><label>Próximo contacto em</label>
      <input class="fi" id="rvd-fu" type="date" value="${addDays(todayStr(),14)}"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="sheetClose()">Cancelar</button>
      <button class="btn btn-green" onclick="saveVisitaDist('${did}')">Guardar ✓</button>
    </div>`);
}

function saveVisitaDist(did){
  const dist = S.arr('distribuidores');
  const idx = dist.findIndex(d=>d.id===did); if(idx<0) return;
  const nota = v('rvd-nota');
  const hoje = todayStr();
  dist[idx].ultimaVisita = hoje;
  dist[idx].lojaAberta = v('rvd-aberta')==='1';
  dist[idx].interesse = v('rvd-int');
  if(nota){
    const ts = new Date().toLocaleDateString('pt-PT',{day:'numeric',month:'short'});
    dist[idx].notas = (dist[idx].notas?dist[idx].notas+'\n\n':'')+`[${ts}] ${nota}`;
  }
  S.set('distribuidores',dist);
  const fuData = v('rvd-fu');
  if(fuData){
    const fus = S.arr('followups');
    fus.push({id:S.id(),clienteId:did,clienteNome:dist[idx].nome,tipo:'visita',motivo:'Follow-up distribuidor',data:fuData,feito:false});
    S.set('followups',fus);
  }
  sheetClose(); renderDist();
}

function ativarDist(did){
  if(!confirm('Marcar como distribuidor ativo?')) return;
  const dist = S.arr('distribuidores');
  const idx = dist.findIndex(d=>d.id===did); if(idx<0) return;
  dist[idx].estado='ativo'; dist[idx].dataInicio=todayStr();
  S.set('distribuidores',dist); sheetClose(); renderDist();
}

function deleteDist(did){
  if(!confirm('Eliminar este distribuidor?')) return;
  S.set('distribuidores',S.arr('distribuidores').filter(d=>d.id!==did));
  sheetClose(); renderDist();
}

  const d = S.arr('distribuidores').find(x=>x.id===id);
  if(!d) return;
  sheetOpen(`<div class="sheet-title">Editar distribuidor</div>
    <div class="fg"><label>Nome da Loja/Empresa</label><input class="fi" id="ed-nome" value="${esc(d.nome)}"></div>

      <div class="fg"><label>Contacto</label><input class="fi" id="ed-cont" value="${esc(d.contacto||'')}"></div>

    <div class="fg-row">
      <div class="fg"><label>Distrito</label><select class="fi" id="ed-dist">${DISTRITOS.map(dd=>`<option ${dd===d.distrito?'selected':''}>${dd}</option>`).join('')}</select></div>
      <div class="fg"><label>Estado</label><select class="fi" id="ed-est"><option value="ativo" ${d.estado==='ativo'?'selected':''}>Ativo</option><option value="potencial" ${d.estado==='potencial'?'selected':''}>Potencial</option></select></div>

function saveEditDist(id){
  const dist = S.arr('distribuidores');
  const idx = dist.findIndex(d=>d.id===id); if(idx<0) return;
  dist[idx] = {...dist[idx],nome:v('ed-nome'),contacto:v('ed-cont'),tel:v('ed-tel'),email:v('ed-email'),distrito:v('ed-dist'),estado:v('ed-est'),notas:v('ed-notas')};
  S.set('distribuidores',dist); sheetClose(); renderDist();
}

    <div class="fg"><label>Nome da Loja / Empresa</label><input class="fi" id="nd-nome" placeholder="Ex: Ferragens Silva"></div>
    <div class="fg-row">
      <div class="fg"><label>Distrito</label><select class="fi" id="nd-dist">${DISTRITOS.map(d=>`<option>${d}</option>`).join('')}</select></div>
      <div class="fg"><label>Grupo de rota</label><select class="fi" id="nd-grupo">${Object.entries(GRUPOS).map(([k,v2])=>`<option value="${k}">${v2.label}</option>`).join('')}</select></div>
    </div>
    <div class="fg"><label>Loja estava aberta?</label>
      <select class="fi" id="nd-aberta"><option value="1">Sim</option><option value="0">Não — tentar depois</option></select></div>
    <div class="fg"><label>Interesse observado</label>
      <select class="fi" id="nd-int"><option value="talvez">Talvez — a avaliar</option><option value="sim">Sim — muito interesse</option><option value="nao">Não — sem interesse</option></select></div>
    <div class="fg"><label>Contacto (se obtiveste)</label><input class="fi" id="nd-cont" placeholder="Nome da pessoa"></div>
    <div class="fg"><label>Telefone</label><input class="fi" id="nd-tel" type="tel" placeholder="9XX XXX XXX"></div>
    <div class="fg"><label>Notas rápidas</label>
      <textarea class="fi" id="nd-notas" rows="2" placeholder="Ex: Loja pequena mas bem localizada. Dono simpático. Deixei tabela."></textarea></div>
    <div class="fg"><label>Estado</label>
      <select class="fi" id="nd-est"><option value="potencial">Potencial — a trabalhar</option><option value="ativo">Ativo — já aceita tabela</option></select></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="sheetClose()">Cancelar</button>
      <button class="btn btn-green" onclick="saveNovoDist()">Guardar</button>
    </div>`);
}
function saveNovoDist(){
  const nome = v('nd-nome'); if(!nome){alert('Nome obrigatório');return;}
  const dist = S.arr('distribuidores');
  dist.push({id:S.id(),nome,contacto:v('nd-cont'),tel:v('nd-tel'),email:'',
    distrito:v('nd-dist'),grupo:v('nd-grupo'),estado:v('nd-est'),
    lojaAberta:v('nd-aberta')==='1',interesse:v('nd-int'),tabela:'A',rapel:'',
    dataInicio:v('nd-est')==='ativo'?todayStr():'',
    ultimaVisita:todayStr(),notas:v('nd-notas')});
  S.set('distribuidores',dist); sheetClose(); renderDist();
}

function openEditRapel(){
  const t = S.get('tabela_precos');
  sheetOpen(`<div class="sheet-title">Editar Rápel</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:16px;">Ajusta os valores quando implementares o rápel oficialmente.</div>
    ${t.rapelFuturo.map((r,i)=>`
      <div style="background:var(--bg3);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;">
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px;">${r.nivel}</div>
        <div class="fg-row">
          <div class="fg"><label>Volume mínimo</label><input class="fi" id="rapel-vol-${i}" value="${r.volume}"></div>
          <div class="fg"><label>% Rápel</label><input class="fi" id="rapel-pct-${i}" value="${r.rapel}"></div>
        </div>
      </div>`).join('')}
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="sheetClose()">Cancelar</button>
      <button class="btn btn-green" onclick="saveRapel(${t.rapelFuturo.length})">Guardar</button>
    </div>`);
}
function saveRapel(n){
  const t = S.get('tabela_precos');
  for(let i=0;i<n;i++){
    t.rapelFuturo[i].volume = document.getElementById('rapel-vol-'+i)?.value||t.rapelFuturo[i].volume;
    t.rapelFuturo[i].rapel = document.getElementById('rapel-pct-'+i)?.value||t.rapelFuturo[i].rapel;
  }
  S.set('tabela_precos',t); sheetClose(); renderDist();
}
